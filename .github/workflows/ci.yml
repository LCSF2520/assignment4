name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create .env file from secrets
        run: |
          echo "APP_MESSAGE=${{ secrets.APP_MESSAGE }}" >> .env
          echo "APP_HEALTH=${{ secrets.APP_HEALTH }}" >> .env

      - name: Verify .env was created
        run: cat .env   # This will print the file (but secrets are hidden in logs)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and run with Docker Compose
        run: |
          docker compose up -d --build
          sleep 5   # Give the app a moment to start

      - name: Test home route
        run: curl http://localhost:5000 | grep "${{ secrets.APP_MESSAGE }}"

      - name: Test health route
        run: curl http://localhost:5000/health | grep "${{ secrets.APP_HEALTH }}"

      - name: Shut down containers
        run: docker compose down